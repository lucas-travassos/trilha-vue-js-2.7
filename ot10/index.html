<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curso Vue JS - Componentes Reutilizáveis</title>
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css">
</head>
<body>

    <div id="app">
        <h1>{{ titulo }}</h1>

        <!-- Exemplo 1: props simples -->
        <h2>Botões com props</h2>
        <button-component text="Clique Aqui" color="green"></button-component>
        <button-component text="Enviar" color="blue"></button-component>
        <button-component text="Cancelar" color="red"></button-component>

        <hr>

        <!-- Exemplo 2: $emit -->
        <h2>Comunicação filho → pai</h2>
        <button-component text="Clique Aqui" color="green" @clicked="handleClick"></button-component>

        <hr>

        <!-- Exemplo 3: slot -->
        <h2>Card com slot</h2>
        <card-component>
            <h3>Título do Cartão</h3>
            <p>Este é o conteúdo do cartão, passado como slot.</p>
        </card-component>

        <hr>

        <!-- Exemplo 4: componente dinâmico -->
        <h2>Componente dinâmico</h2>
        <button @click="currentComponent = 'component-a'">Componente A</button>
        <button @click="currentComponent = 'component-b'">Componente B</button>
        <component :is="currentComponent"></component>

        <hr>

        <!-- Exemplo 5: menu-bar reutilizado -->
        <h2>Menu reutilizado</h2>
        <menu-bar></menu-bar>
        <menu-bar></menu-bar>
        <menu-bar></menu-bar>
    </div>

    <!-- Template do menu-bar -->
    <template id="menu">
        <ul>
            <li>Item 1</li>
            <li>Item 2</li>
            <li>Item 3</li>
        </ul>
    </template>

    <script src="https://cdn.jsdelivr.net/npm/vue@2.7.14/dist/vue.js"></script>
    <script>
        Vue.component('button-component', {
            props: ['text', 'color'],
            template: '<button :style="{ backgroundColor: color, color: \'white\', margin: \'5px\' }" @click="emitClick">{{ text }}</button>',
            methods: {
                emitClick() {
                    this.$emit('clicked');
                }
            }
        });

        Vue.component('card-component', {
            template: `
                <div style="border: 1px solid #ccc; padding: 16px; margin: 10px 0; border-radius: 4px;">
                    <slot></slot>
                </div>
            `
        });

        Vue.component('component-a', {
            template: '<div style="padding: 10px; background: #e0f0e0;">Este é o Componente A</div>'
        });

        Vue.component('component-b', {
            template: '<div style="padding: 10px; background: #e0e0f0;">Este é o Componente B</div>'
        });

        Vue.component('menu-bar', {
            template: '#menu'
        });

        var app = new Vue({
            el: '#app',
            data: {
                titulo: 'Vue JS',
                currentComponent: 'component-a'
            },
            methods: {
                handleClick() {
                    alert('O botão foi clicado!');
                }
            }
        });
    </script>

</body>
</html>

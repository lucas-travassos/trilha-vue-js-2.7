<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curso Vue JS - diretiva v-bind, atribuindo valor às tags html</title>
    <style>
        .red {
            color: red;
        }
        .green {
            color: green;
        }
        .blue {
            color: blue;
        }
    </style>
</head>
<body>

    <div id="app">
        <h1>{{ titulo }}</h1>

        <img
            v-bind:src="urlImagem"
            v-bind:alt="altImagem"
        >

        <p :class="classe">
            Lorem ipsum dolor sit, amet consectetur adipisicing elit.
            Cupiditate placeat illo iste, expedita quos culpa dolor, molestiae quod,
            quibusdam harum quia? Laborum, possimus! Quaerat quis repellendus voluptas sunt, quod repellat!
        </p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/vue@2.7.14/dist/vue.js"></script>
    <script>
        var app = new Vue({
            el: '#app',
            data: {
                titulo: 'Aprendendo Vue JS',
                urlImagem: 'https://br.vuejs.org/images/logo.png',
                altImagem: 'Vuejs is awesome!',
                classe: 'red'
            }
        })
    </script>

</body>
</html>
